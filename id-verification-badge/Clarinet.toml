[project]
name = "id-verification-badge"
version = "2.0.0"
description = "Enhanced identity verification badge system with levels and expiration"
authors = ["midorichie"]
requirements = []
telemetry = false
cache_dir = ".cache"
boot_contracts = []

[contracts.id-badge]
path = "contracts/id-badge.clar"
clarity_version = 2
epoch = 2.5

[repl]
costs = true
parser = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
